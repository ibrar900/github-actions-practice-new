name: Image Scan

on:
  push:
    branches: [main]
#  workflow_call:

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: login to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Trivy Scanner
        uses: aquasecurity/trivy-action@v0.65.0
        with:
          severity: "CRITICAL"
          exit-code: "1"
