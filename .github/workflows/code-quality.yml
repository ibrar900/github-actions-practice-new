# Linting and SAST Scan
# lint - flake & SAST - Bandit
name: Code Quality

on: 
    push: 
        branches: [main]

#    workflow_call:

jobs:
    validate:
      runs-on: ubuntu-latest
      strategy:
            fail-fast: false # if one of the matrix fails, it will not stop the others from runnning
            matrix:
                python version: ["3.11", "3.12", "3.13"] # different python versions to test
                lines: [1,2,3,4] # different lines to test

        steps:
          - name: checkout code
            uses: actions/checkout@v4

          - name: setup python ${{matrix.python-version}}
            uses: actions/setup-python@v5
            with:
                python-version: ${{matrix.python-version}}

          - name: install dependencies
            run: pip install -r requirements.txt

          - name: run linter
            run: flake8 app.py

          - name: run SAST scan
            run: bandit -r app.py



