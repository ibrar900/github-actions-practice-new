# API Keys, sensitive data, credentials
name: Secrets Scan

on:
  workflow_call:
#   push:
#      branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # to scan the entire history of the repository

      - name: Run GitLeaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # github manges the token, we just need to pass it to the action
