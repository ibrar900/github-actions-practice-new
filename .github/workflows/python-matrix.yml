name: python lint # syntax check for pyhton code

on:
    push:
        branches: [main]

jobs:
    validate: # name of job
        runs-on: ubuntu-latest # the job runs on operating system

        steps:
          - name: checkout code
            uses: actions/checkout@v4

          - name: setup python
            uses: actions/setup-python@v5
            with:
                python-version: 3.13

          - name: install dependencies
            run: pip install -r requirements.txt

          - name: run linter
            run: flake8 app.py
