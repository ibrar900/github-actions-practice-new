# this is name of the workflow that will be displayed in the Actions tab
name: CICD

# Manual click (deliver) workflow whenever user needs
on: 
  workflow_dispatch:
    inputs:
      environment:
        description: This ts the environment value where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
# every job needs seperate runner, its called parallelism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from GitHub"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: build Docker container
        run: echo "Docker container Build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: test the container
        run: echo "Testing the container"
  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
